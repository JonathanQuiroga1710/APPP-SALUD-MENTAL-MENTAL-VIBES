<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cuestionario Matemático</title>

<!-- MathJax -->
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

<script async
src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.contenedor{
    background:white;
    width:750px;
    padding:30px;
    border-radius:20px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.1);
}

#pregunta{
    font-size:22px;
    line-height:1.7;
    margin-bottom:25px;
    font-weight:bold;
}

.opcion{
    width:100%;
    padding:16px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    background:#e8e8e8;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

.opcion:hover{
    background:#d6d6d6;
}

#mensaje{
    margin-top:25px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.correcta{
    color:green;
}

.incorrecta{
    color:red;
}

.botones{
    margin-top:30px;
    display:flex;
    justify-content:flex-end;
}

.siguiente{
    background:#4CAF50;
    color:white;
    border:none;
    padding:14px 30px;
    border-radius:12px;
    font-size:20px;
    cursor:pointer;
}

.siguiente:hover{
    background:#3d9441;
}

#resultadoFinal{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin-top:30px;
}

</style>

</head>

<body>

<div class="contenedor">

    <div id="pregunta"></div>

    <div id="opciones"></div>

    <div id="mensaje"></div>

    <div class="botones">

        <button class="siguiente"
        onclick="siguientePregunta()">

            Siguiente →

        </button>

    </div>

    <div id="resultadoFinal"></div>

</div>

<script>

const preguntas = [

{
pregunta: `
\\[
41)\\text{ Si } x,y>0 \\text{ y } a\\in\\mathbb{R}^{+}-\\{1\\},
\\text{ entonces es VERDAD que:}
\\]
`,
opciones:[
"a) \\(\\log_a(x/y)=\\log_a(x)/\\log_a(y)\\)",
"b) \\(\\log_a(x)\\log_a(y)=\\log_a(x)+\\log_a(y)\\)",
"c) \\(\\log_a(xy)=\\log_a(x)+\\log_a(y)\\)",
"d) \\(\\log_a(x-y)=\\log_a(x)-\\log_a(y)\\)",
"e) \\(\\log_a(x)/\\log_a(y)=\\log_a(x)-\\log_a(y)\\)"
],
correcta:2
},

{
pregunta: `
\\[
42)\\text{ Sean las proposiciones } a,b,c
\\text{ tales que }
a\\vee b \\equiv 0
\\text{ y }
(\\neg a \\wedge c)\\to b \\equiv 1.
\\]
\\[
\\text{ Entonces es VERDAD que:}
\\]
`,
opciones:[
"a) Las tres proposiciones son verdaderas",
"b) Solamente las proposiciones a y b son verdaderas",
"c) Solamente las proposiciones a y c son verdaderas",
"d) Solamente las proposiciones b y c son verdaderas",
"e) Las tres proposiciones son falsas"
],
correcta:4
},

{
pregunta: `
\\[
43)\\text{ El argumento del número complejo }
z=\\frac{-2+2i}{\\sqrt3+3i}
\\text{ es igual a:}
\\]
`,
opciones:[
"a) \\(\\frac{\\pi}{3}\\)",
"b) \\(\\frac{5\\pi}{12}\\)",
"c) \\(\\frac{3\\pi}{4}\\)",
"d) \\(\\frac{13\\pi}{12}\\)",
"e) \\(\\frac{7\\pi}{12}\\)"
],
correcta:1
},

{
pregunta: `
\\[
45)\\text{ El dominio de la función invertible }
f(x)=\\frac12\\arcsen(3x-1)
\\text{ es:}
\\]
`,
opciones:[
"a) \\([-\\frac13,\\frac13]\\)",
"b) \\([-1,1]\\)",
"c) \\([-\\frac23,\\frac23]\\)",
"d) \\([-\\frac23,0]\\)",
"e) \\([0,\\frac23]\\)"
],
correcta:4
},

{
pregunta: `
\\[
46)\\text{ Si } x,y\\in\\mathbb{R},
\\text{ entonces }
(\\cos(x)+\\sen(x))^2-(\\cos(x)-\\sen(x))^2
\\]
\\[
\\text{ es igual a:}
\\]
`,
opciones:[
"a) 2",
"b) \\(-2\\sen(2x)\\)",
"c) \\(-2\\cos(2x)\\)",
"d) \\(2\\sen(2x)\\)",
"e) \\(2\\cos(2x)\\)"
],
correcta:3
},

{
pregunta: `
\\[
47)\\text{ El valor numérico de la expresión:}
\\]
\\[
\\frac{
2\\mu(1-e)+|2-3sgn(2-e)|
}{
\\sqrt3\\cos\\left(\\frac{11\\pi}{6}\\right)
}
\\]
`,
opciones:[
"a) \\(\\frac23\\)",
"b) \\(\\frac53\\)",
"c) \\(\\frac{10}{3}\\)",
"d) \\(-\\frac23\\)",
"e) \\(-\\frac{10}{3}\\)"
],
correcta:2
},

{
pregunta: `
\\[
48)\\text{ El vértice de la parábola }
y^2-4y-6x-8=0
\\text{ es:}
\\]
`,
opciones:[
"a) (2,-2)",
"b) (-2,2)",
"c) (2,7)",
"d) (2,-3)",
"e) (4,-4)"
],
correcta:1
},

{
pregunta: `
\\[
49)\\text{ Si }
A
\\text{ es un conjunto tal que }
\\{x,\\{y\\},\\{x,y\\}\\}\\in P(A),
\\]
\\[
\\text{ entonces es VERDAD que:}
\\]
`,
opciones:[
"a) \\(\\{y\\}\\in P(A)\\)",
"b) \\(\\{x,\\{y\\}\\}\\in P(A)\\)",
"c) \\(y\\in A\\)",
"d) \\(\\{x,y\\}\\in P(A)\\)",
"e) \\(\\{x\\}\\in A\\)"
],
correcta:0
},

{
pregunta: `
\\[
54)\\text{ Considerando las restricciones del caso,}
\\]
\\[
x\\left(
\\frac{x+1}{x-1}-\\frac{x}{x+1}
\\right)
\\left(
x-\\frac1x
\\right)
\\]
\\[
\\text{ se obtiene:}
\\]
`,
opciones:[
"a) \\(x-3\\)",
"b) \\(3+x\\)",
"c) \\(1-3x\\)",
"d) \\(3x+1\\)",
"e) \\(3x-1\\)"
],
correcta:3
},

{
pregunta: `
\\[
57)\\text{ Si un cilindro de radio } r
\\text{ está inscrito en una esfera de radio } 2r,
\\]
\\[
\\text{ entonces la altura del cilindro es igual a:}
\\]
`,
opciones:[
"a) \\(2r\\)",
"b) \\(2\\sqrt2 r\\)",
"c) \\(2\\sqrt3 r\\)",
"d) \\(3r\\)",
"e) \\(2\\sqrt5 r\\)"
],
correcta:2
},

{
pregunta: `
\\[
58)\\text{ Las edades de Luis, Juan y Pedro son enteros consecutivos.}
\\]
\\[
\\text{ Luis es el menor y Pedro el mayor.}
\\]
\\[
2L+3J+4P=740
\\]
\\[
\\text{ La suma de Luis y Pedro es:}
\\]
`,
opciones:[
"a) 170",
"b) 164",
"c) 163",
"d) 150",
"e) 145"
],
correcta:1
},

{
pregunta: `
\\[
59)\\text{ Si } f:\\mathbb{R}\\to\\mathbb{R}
\\text{ definida por }
f(x)=x|x-4|,
\\]
\\[
\\text{ entonces es VERDAD que:}
\\]
`,
opciones:[
"a) \\(f\\) es impar",
"b) \\(f\\) es inyectiva",
"c) \\(f\\) es creciente",
"d) \\(f\\) es acotada",
"e) \\(f\\) es sobreyectiva"
],
correcta:4
}

];

let indice = 0;
let puntaje = 0;
let respondida = false;

function cargarPregunta(){

    respondida = false;

    document.getElementById("mensaje").innerHTML = "";

    const preguntaActual = preguntas[indice];

    document.getElementById("pregunta").innerHTML =
    preguntaActual.pregunta;

    let opcionesHTML = "";

    preguntaActual.opciones.forEach((opcion,i)=>{

        opcionesHTML += `
        <button class="opcion"
        onclick="verificar(${i}, this)">
        ${opcion}
        </button>
        `;
    });

    document.getElementById("opciones").innerHTML =
    opcionesHTML;

    MathJax.typeset();
}

function verificar(indiceSeleccionado, boton){

    if(respondida) return;

    respondida = true;

    const mensaje =
    document.getElementById("mensaje");

    const botones =
    document.querySelectorAll(".opcion");

    botones.forEach(btn => {

        btn.disabled = true;

        btn.style.cursor = "not-allowed";

        btn.style.opacity = "0.8";
    });

    if(indiceSeleccionado === preguntas[indice].correcta){

        mensaje.innerHTML =
        "✅ ¡Respuesta correcta!";

        mensaje.className = "correcta";

        boton.style.background =
        "#b8f5b8";

        puntaje++;

    }

    else{

        mensaje.innerHTML =
        "❌ Respuesta incorrecta";

        mensaje.className =
        "incorrecta";

        boton.style.background =
        "#ffb8b8";

        botones[preguntas[indice].correcta]
        .style.background = "#b8f5b8";
    }
}

function siguientePregunta(){

    indice++;

    if(indice < preguntas.length){

        cargarPregunta();

    }else{

        mostrarResultado();
    }
}

function mostrarResultado(){

    document.getElementById("pregunta").innerHTML = "";

    document.getElementById("opciones").innerHTML = "";

    document.getElementById("mensaje").innerHTML = "";

    let nota =
    (puntaje/preguntas.length)*10;

    document.getElementById("resultadoFinal").innerHTML = `
    🎓 Cuestionario finalizado <br><br>

    ✅ Correctas:
    ${puntaje} de ${preguntas.length}
    <br><br>

    📘 Nota final:
    ${nota.toFixed(2)} / 10
    `;
}

cargarPregunta();

</script>

</body>
</html>
